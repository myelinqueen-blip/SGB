<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신강북권 여자부 창가청년스쿨 - 인원체크</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* === 인증 화면 === */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-screen.hidden {
            display: none;
        }

        .auth-modal {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .auth-modal h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .auth-modal p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .auth-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 12px;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 4px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: #999;
            font-size: 14px;
        }

        /* === 헤더 === */
        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .header h1 {
            color: #667eea;
            font-size: 22px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            text-align: right;
            font-size: 13px;
        }

        .user-email {
            color: #999;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        /* === 탭 === */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .tab-btn {
            padding: 10px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* === 콘텐츠 === */
        .tab-content {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .tab-content.active {
            display: block;
        }

        /* === 인원체크 탭 === */
        .attendance-grid {
            display: grid;
            gap: 15px;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .month-selector button {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .month-selector button:hover {
            background: #f5f5f5;
        }

        .current-month {
            font-weight: 600;
            color: #667eea;
            min-width: 80px;
            text-align: center;
        }

        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .attendance-table th,
        .attendance-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .attendance-table th {
            background: #f8f9ff;
            font-weight: 600;
            color: #667eea;
        }

        .attendance-table tr:hover {
            background: #f8f9ff;
        }

        .status-badge {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-badge.present {
            background: #2ecc71;
            color: white;
        }

        .status-badge.absent {
            background: #e74c3c;
            color: white;
        }

        .status-badge.oneonone {
            background: #f39c12;
            color: white;
        }

        .name-cell {
            font-weight: 600;
            color: #333;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .edit-btn, .delete-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .edit-btn {
            background: #3498db;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        /* === 모달 === */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
        }

        .modal-content h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-confirm {
            background: #667eea;
            color: white;
        }

        .btn-cancel {
            background: #eee;
            color: #333;
        }

        /* === 통계 탭 === */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
        }

        /* === 연간기록 탭 === */
        .year-logs {
            display: grid;
            gap: 15px;
        }

        .log-entry {
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .log-date {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .log-content {
            color: #666;
            font-size: 14px;
        }

        /* === 반응형 === */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab-btn {
                flex: 1;
                min-width: 100px;
            }

            .attendance-table {
                font-size: 13px;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }
        }

        .saving {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #667eea;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 13px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
            }
            to {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <!-- 인증 화면 -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-modal">
            <h1>🔐 관리자 인증</h1>
            <p>신강북권 여자부 창가청년스쿨</p>
            <div class="form-group">
                <label>관리자 비밀번호</label>
                <input type="password" id="passwordInput" placeholder="비밀번호 입력" autocomplete="off">
            </div>
            <button class="auth-button" onclick="handleAdminAuth()">확인</button>
            <div class="error-message" id="authError"></div>
            <div class="loading" id="authLoading" style="display: none; margin-top: 15px;">
                Firebase 연결 중...
            </div>
        </div>
    </div>

    <!-- 메인 앱 -->
    <div id="mainApp" style="display: none;">
        <div class="container">
            <!-- 헤더 -->
            <div class="header">
                <h1>✓ 신강북권 여자부 창가청년스쿨</h1>
                <div class="header-right">
                    <div class="user-info">
                        <div>관리자</div>
                        <div class="user-email" id="userEmail"></div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
                </div>
            </div>

            <!-- 탭 -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('attendance')">인원 체크</button>
                <button class="tab-btn" onclick="switchTab('yearlog')">연간기록</button>
                <button class="tab-btn" onclick="switchTab('stats')">통계</button>
            </div>

            <!-- 인원 체크 탭 -->
            <div id="attendance" class="tab-content active">
                <div class="month-selector">
                    <button onclick="previousMonth()">‹</button>
                    <div class="current-month" id="monthDisplay"></div>
                    <button onclick="nextMonth()">›</button>
                </div>

                <table class="attendance-table">
                    <thead>
                        <tr>
                            <th>이름</th>
                            <th>창청스</th>
                            <th>일대일</th>
                            <th>지역</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #999;">
                                연결 중...
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div style="margin-top: 20px;">
                    <h3 style="color: #667eea; margin-bottom: 15px;">새 인원 추가</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="text" id="newNameInput" placeholder="이름" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <select id="newAreaInput" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                            <option value="">지역 선택</option>
                            <option value="강북">강북</option>
                            <option value="미아">미아</option>
                            <option value="삼양">삼양</option>
                            <option value="수유">수유</option>
                        </select>
                        <button onclick="addNewPerson()" style="grid-column: 1/-1; padding: 10px; background: #667eea; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">추가</button>
                    </div>
                </div>
            </div>

            <!-- 연간기록 탭 -->
            <div id="yearlog" class="tab-content">
                <div class="year-logs" id="yearLogList">
                    <div style="text-align: center; color: #999; padding: 40px;">
                        기록이 없습니다.
                    </div>
                </div>
            </div>

            <!-- 통계 탭 -->
            <div id="stats" class="tab-content">
                <div class="stats-container">
                    <div class="stat-card">
                        <h3>전체 인원</h3>
                        <div class="number" id="totalCount">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>창청스 참석</h3>
                        <div class="number" id="presentCount">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>일대일 참석</h3>
                        <div class="number" id="oneononeCount">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>참석률</h3>
                        <div class="number" id="attendanceRate">0%</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="attendanceChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="areaChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 편집 모달 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>✏️ 이름 수정 / 삭제</h2>
            <div class="form-group">
                <label>새로운 이름</label>
                <input type="text" id="editNameInput" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
            </div>
            <div class="error-message" id="editError"></div>
            <div class="modal-buttons">
                <button class="btn-confirm" onclick="saveEditedName()">저장</button>
                <button class="btn-cancel" onclick="cancelEdit()">취소</button>
            </div>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;">
                <button onclick="deleteConfirm()" style="width: 100%; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">삭제</button>
            </div>
        </div>
    </div>

    <script>
        // ===== Firebase 설정 =====
        const firebaseConfig = {
            apiKey: "AIzaSyA5b7z9xZ5kL9mN2oP4qR6sT7uV8wX9yZ",
            authDomain: "sgb-changcheongs.firebaseapp.com",
            databaseURL: "https://sgb-changcheongs-default-rtdb.firebaseio.com",
            projectId: "sgb-changcheongs",
            storageBucket: "sgb-changcheongs.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdefghijklmnop"
        };

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ===== 상태 관리 =====
        let currentUser = null;
        let currentMonth = new Date();
        let attendanceData = {};
        let editingPersonId = null;

        // ===== 초기화 =====
        window.addEventListener('load', () => {
            auth.onAuthStateChanged(user => {
                if (user && user.email === 'admin@sgb.com') {
                    currentUser = user;
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('mainApp').style.display = 'block';
                    document.getElementById('userEmail').textContent = user.email;
                    loadAttendanceData();
                    loadYearLogs();
                } else {
                    document.getElementById('authScreen').classList.remove('hidden');
                    document.getElementById('mainApp').style.display = 'none';
                }
            });
        });

        // ===== 인증 =====
        async function handleAdminAuth() {
            const password = document.getElementById('passwordInput').value.trim();
            const errorEl = document.getElementById('authError');
            const loadingEl = document.getElementById('authLoading');

            if (!password) {
                errorEl.textContent = '비밀번호를 입력하세요.';
                errorEl.classList.add('show');
                return;
            }

            // 비밀번호 검증 (sgb2026)
            if (password !== 'sgb2026') {
                errorEl.textContent = '비밀번호가 맞지 않습니다.';
                errorEl.classList.add('show');
                return;
            }

            errorEl.classList.remove('show');
            loadingEl.style.display = 'block';

            try {
                // 기존 세션 로그아웃
                await auth.signOut();

                // 관리자 계정으로 로그인
                await auth.signInWithEmailAndPassword('admin@sgb.com', 'sgb2026');
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    // 계정이 없으면 새로 생성
                    try {
                        await auth.createUserWithEmailAndPassword('admin@sgb.com', 'sgb2026');
                        // 관리자 권한 설정
                        const uid = auth.currentUser.uid;
                        await db.ref(`admins/${uid}`).set(true);
                    } catch (createError) {
                        errorEl.textContent = '인증 오류가 발생했습니다.';
                        errorEl.classList.add('show');
                    }
                } else {
                    errorEl.textContent = '인증 오류가 발생했습니다.';
                    errorEl.classList.add('show');
                }
            } finally {
                loadingEl.style.display = 'none';
                document.getElementById('passwordInput').value = '';
            }
        }

        function handleLogout() {
            auth.signOut();
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('mainApp').style.display = 'none';
        }

        // ===== 탭 네비게이션 =====
        function switchTab(tabName) {
            // 탭 콘텐츠 숨기기
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });

            // 탭 버튼 스타일 제거
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('active');
            });

            // 선택한 탭 표시
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // 통계 탭이면 차트 렌더링
            if (tabName === 'stats') {
                setTimeout(renderCharts, 100);
            }
        }

        // ===== 날짜 관리 =====
        function previousMonth() {
            currentMonth.setMonth(currentMonth.getMonth() - 1);
            updateMonthDisplay();
        }

        function nextMonth() {
            currentMonth.setMonth(currentMonth.getMonth() + 1);
            updateMonthDisplay();
        }

        function updateMonthDisplay() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth() + 1;
            document.getElementById('monthDisplay').textContent = `${year}년 ${month}월`;
            loadAttendanceData();
        }

        // ===== Firebase 데이터 로드 =====
        function loadAttendanceData() {
            const year = currentMonth.getFullYear();
            const month = String(currentMonth.getMonth() + 1).padStart(2, '0');
            const monthKey = `${year}-${month}`;

            db.ref(`attendance/${monthKey}`).once('value', snapshot => {
                attendanceData = snapshot.val() || {};
                renderAttendanceTable();
            });
        }

        function renderAttendanceTable() {
            const tbody = document.getElementById('attendanceList');
            tbody.innerHTML = '';

            if (Object.keys(attendanceData).length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">인원이 없습니다.</td></tr>';
                return;
            }

            for (const [personId, person] of Object.entries(attendanceData)) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="name-cell">${person.name}</td>
                    <td>
                        <span class="status-badge ${person.classroom ? 'present' : 'absent'}" 
                              onclick="toggleStatus('${personId}', 'classroom')">
                            ${person.classroom ? '✓' : '✗'}
                        </span>
                    </td>
                    <td>
                        <span class="status-badge ${person.oneonone ? 'oneonone' : 'absent'}" 
                              onclick="toggleStatus('${personId}', 'oneonone')">
                            ${person.oneonone ? '△' : '✗'}
                        </span>
                    </td>
                    <td>${person.area || '-'}</td>
                    <td>
                        <div class="action-btns">
                            <button class="edit-btn" onclick="openEditModal('${personId}', '${person.name}')">수정</button>
                            <button class="delete-btn" onclick="editingPersonId='${personId}'; deleteConfirm();">삭제</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }

        function toggleStatus(personId, type) {
            const year = currentMonth.getFullYear();
            const month = String(currentMonth.getMonth() + 1).padStart(2, '0');
            const monthKey = `${year}-${month}`;

            const current = attendanceData[personId][type];
            db.ref(`attendance/${monthKey}/${personId}/${type}`).set(!current);

            attendanceData[personId][type] = !current;
            renderAttendanceTable();
            showSavingIndicator();
        }

        function addNewPerson() {
            const name = document.getElementById('newNameInput').value.trim();
            const area = document.getElementById('newAreaInput').value;

            if (!name || !area) {
                alert('이름과 지역을 모두 입력하세요.');
                return;
            }

            // 중복 확인
            for (const person of Object.values(attendanceData)) {
                if (person.name === name) {
                    alert('이미 존재하는 이름입니다.');
                    return;
                }
            }

            const year = currentMonth.getFullYear();
            const month = String(currentMonth.getMonth() + 1).padStart(2, '0');
            const monthKey = `${year}-${month}`;
            const personId = Date.now().toString();

            db.ref(`attendance/${monthKey}/${personId}`).set({
                name: name,
                area: area,
                classroom: false,
                oneonone: false
            });

            document.getElementById('newNameInput').value = '';
            document.getElementById('newAreaInput').value = '';
            loadAttendanceData();
            showSavingIndicator();
        }

        // ===== 편집 모달 =====
        function openEditModal(personId, name) {
            editingPersonId = personId;
            document.getElementById('editNameInput').value = name;
            document.getElementById('editModal').classList.add('show');
            document.getElementById('editError').classList.remove('show');
        }

        function saveEditedName() {
            const newName = document.getElementById('editNameInput').value.trim();
            const errorEl = document.getElementById('editError');

            if (!newName) {
                errorEl.textContent = '이름을 입력하세요.';
                errorEl.classList.add('show');
                return;
            }

            // 중복 확인
            for (const [id, person] of Object.entries(attendanceData)) {
                if (id !== editingPersonId && person.name === newName) {
                    errorEl.textContent = '이미 존재하는 이름입니다.';
                    errorEl.classList.add('show');
                    return;
                }
            }

            const year = currentMonth.getFullYear();
            const month = String(currentMonth.getMonth() + 1).padStart(2, '0');
            const monthKey = `${year}-${month}`;

            db.ref(`attendance/${monthKey}/${editingPersonId}/name`).set(newName);
            attendanceData[editingPersonId].name = newName;
            renderAttendanceTable();
            cancelEdit();
            showSavingIndicator();
        }

        function deleteConfirm() {
            if (!confirm('정말 삭제하시겠습니까?')) return;

            const year = currentMonth.getFullYear();
            const month = String(currentMonth.getMonth() + 1).padStart(2, '0');
            const monthKey = `${year}-${month}`;

            db.ref(`attendance/${monthKey}/${editingPersonId}`).remove();
            delete attendanceData[editingPersonId];
            renderAttendanceTable();
            cancelEdit();
            showSavingIndicator();
        }

        function cancelEdit() {
            document.getElementById('editModal').classList.remove('show');
            editingPersonId = null;
        }

        // ===== 연간기록 =====
        function loadYearLogs() {
            db.ref('logs').once('value', snapshot => {
                const logs = snapshot.val() || {};
                const logList = document.getElementById('yearLogList');

                if (Object.keys(logs).length === 0) {
                    logList.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">기록이 없습니다.</div>';
                    return;
                }

                logList.innerHTML = '';
                Object.values(logs)
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .forEach(log => {
                        const logEl = document.createElement('div');
                        logEl.className = 'log-entry';
                        logEl.innerHTML = `
                            <div class="log-date">${log.date}</div>
                            <div class="log-content">${log.content}</div>
                        `;
                        logList.appendChild(logEl);
                    });
            });
        }

        // ===== 통계 =====
        let attendanceChart = null;
        let areaChart = null;

        function renderCharts() {
            const year = currentMonth.getFullYear();
            const month = String(currentMonth.getMonth() + 1).padStart(2, '0');
            const monthKey = `${year}-${month}`;

            db.ref(`attendance/${monthKey}`).once('value', snapshot => {
                const data = snapshot.val() || {};
                const people = Object.values(data);

                // 통계 업데이트
                const total = people.length;
                const present = people.filter(p => p.classroom).length;
                const oneonone = people.filter(p => p.oneonone).length;
                const rate = total > 0 ? Math.round((present / total) * 100) : 0;

                document.getElementById('totalCount').textContent = total;
                document.getElementById('presentCount').textContent = present;
                document.getElementById('oneononeCount').textContent = oneonone;
                document.getElementById('attendanceRate').textContent = rate + '%';

                // 참석 현황 차트
                const classroomData = people.map(p => (p.classroom ? 1 : 0));
                renderAttendanceChart(classroomData);

                // 지역별 차트
                const areaMap = {};
                people.forEach(p => {
                    areaMap[p.area] = (areaMap[p.area] || 0) + 1;
                });
                renderAreaChart(areaMap);
            });
        }

        function renderAttendanceChart(data) {
            const ctx = document.getElementById('attendanceChart');
            if (attendanceChart) attendanceChart.destroy();

            attendanceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['참석', '미참석'],
                    datasets: [{
                        data: [
                            data.filter(x => x).length,
                            data.filter(x => !x).length
                        ],
                        backgroundColor: ['#2ecc71', '#e74c3c'],
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function renderAreaChart(areaMap) {
            const ctx = document.getElementById('areaChart');
            if (areaChart) areaChart.destroy();

            areaChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(areaMap),
                    datasets: [{
                        label: '인원',
                        data: Object.values(areaMap),
                        backgroundColor: 'rgba(102, 126, 234, 0.6)',
                        borderColor: '#667eea',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        // ===== 유틸 =====
        function showSavingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'saving';
            indicator.textContent = '✓ 저장 중...';
            document.body.appendChild(indicator);
            setTimeout(() => indicator.remove(), 2000);
        }

        // 엔터 키로 비밀번호 확인
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('passwordInput');
            if (passwordInput) {
                passwordInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleAdminAuth();
                });
            }
        });
    </script>
</body>
</html>
