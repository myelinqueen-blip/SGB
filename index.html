<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>신강북권 여자부 창가청년스쿨</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<!-- Firebase -->

import { getDatabase, ref, set, get, onValue, update, remove }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
/* ★★★ Firebase 설정을 본인 것으로 교체하세요 ★★★ */
const firebaseConfig = {
  apiKey: "AIzaSyDJimAWadCpWh6y2cdc9KIF88JBwZiF1kM",
  authDomain: "sgb-changcheongs.firebaseapp.com",
  databaseURL: "https://sgb-changcheongs-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sgb-changcheongs",
  storageBucket: "sgb-changcheongs.firebasestorage.app",
  messagingSenderId: "821903570417",
  appId: "1:821903570417:web:410e676011347585bc4050"
};
try {
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  window._fbDB=db; window._fbRef=ref; window._fbSet=set; window._fbGet=get;
  window._fbOnValue=onValue; window._fbUpdate=update; window._fbRemove=remove;
  window._fbReady=true;
} catch(e) { window._fbReady=false; }
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
:root{
  --bg:#f0f4f8; --surface:#fff; --surface2:#f4f7fb; --border:#dde3ee;
  --text:#1a1d2e; --text-sub:#5a6380; --text-light:#a0aec0;
  --head-bg:#1e2d5a; --head-acc:#4e7cff;
  --em:#3ec9a7; --em-d:#1a9979; --em-bg:#e8f9f5;
  --oc:#14b8a6; --tc:#64748b;
  --conf:#fff8dc; --conf-b:#f59e0b;
  --shadow:0 2px 12px rgba(30,45,90,.08);
  --shadow-md:0 6px 28px rgba(30,45,90,.14);
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;font-size:16px;word-break:keep-all;line-height:1.5;}

/* ═══ HEADER ═══ */
#hdr{
  background:var(--head-bg);
  position:sticky;top:0;z-index:300;
  box-shadow:0 2px 12px rgba(30,45,90,.3);
  transition:transform .28s,opacity .28s;
}
#hdr.hidden{transform:translateY(-100%);opacity:0;pointer-events:none;}

/* 헤더 1행: 타이틀 */
.hdr-row1{
  display:flex;align-items:center;
  padding:9px 14px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.htitle{font-size:.9rem;font-weight:800;color:#fff;white-space:nowrap;}

/* 헤더 2행: 탭 + 관리자 */
.hdr-row2{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 14px;gap:8px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.hdr-row2::-webkit-scrollbar{display:none;}

.tab-btns{display:flex;gap:3px;flex-shrink:0;}
.tb{padding:7px 14px;border-radius:7px;border:none;
  background:rgba(255,255,255,.12);font-size:.9rem;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  color:rgba(255,255,255,.75);font-weight:700;white-space:nowrap;
  transition:.15s;-webkit-tap-highlight-color:transparent;}
.tb.active{background:var(--head-acc);color:#fff;}

.adm-btn{padding:7px 14px;border-radius:7px;
  border:1.5px solid rgba(255,255,255,.3);background:transparent;
  font-size:.9rem;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;color:rgba(255,255,255,.7);font-weight:700;white-space:nowrap;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.adm-btn.on{background:#f59e0b;border-color:#f59e0b;color:#fff;}
.adm-badge{display:none;background:#f59e0b;border-radius:5px;
  padding:3px 9px;font-size:.75rem;color:#fff;font-weight:800;flex-shrink:0;}
.adm-badge.show{display:inline-block;}

/* syncBar */
#syncBar{
  background:var(--head-bg);border-top:1px solid rgba(255,255,255,.06);
  padding:3px 14px;font-size:.68rem;color:rgba(255,255,255,.45);
  display:flex;align-items:center;gap:5px;
}
.sync-dot{width:5px;height:5px;border-radius:50%;background:#6b7280;flex-shrink:0;}
.sync-dot.ok{background:#3ec9a7;}.sync-dot.err{background:#f59e0b;}

/* ═══ STATS BAR ═══ */
#statsBar{
  position:sticky;top:84px;z-index:200;
  background:var(--surface);
  border-bottom:2.5px solid var(--em);
  box-shadow:0 3px 10px rgba(30,45,90,.08);
  transition:top .28s;
}
body.hid #statsBar{top:0;}

/* 통계바 내부: 월 (왼쪽) + 화살표 + 창청스/일대일 (오른쪽) */
.stats-inner{
  display:flex;align-items:center;padding:8px 16px;gap:0;
}
.month-nav{
  display:flex;align-items:center;gap:4px;flex-shrink:0;
}
.mnav-btn{
  border:none;background:none;cursor:pointer;
  padding:4px 8px;border-radius:6px;
  font-size:1.1rem;color:#c0c8d8;font-weight:700;
  -webkit-tap-highlight-color:transparent;
  transition:.1s;line-height:1;
}
.mnav-btn:hover{color:#7a8aaa;}
.month-label{
  font-size:1.6rem;font-weight:900;color:var(--head-bg);
  cursor:pointer;padding:0 4px;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
/* 숨겨진 select (month-label 클릭 시 열림) */
.month-sel-hidden{
  position:absolute;opacity:0;width:0;height:0;pointer-events:none;
}
.stats-counts{
  display:flex;align-items:center;gap:16px;margin-left:auto;
}
.sc-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.sc-label{font-size:.68rem;color:var(--text-sub);font-weight:600;}
.sc-val{font-size:1.6rem;font-weight:900;line-height:1;}
.sc-val.vo{color:var(--oc);font-size:1.9rem;text-shadow:0 0 10px rgba(20,184,166,.25);}
.sc-val.vt{color:var(--tc);}

/* ═══ TAB CONTENT ═══ */
.tab{display:none;padding:12px 12px 80px;max-width:1600px;margin:0 auto;}
.tab.active{display:block;}

/* ═══ 지역 필터 ═══ */
.rf{display:flex;gap:6px;margin-bottom:12px;flex-wrap:nowrap;
  overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.rf::-webkit-scrollbar{display:none;}
.rfb{padding:8px 16px;border-radius:22px;border:2px solid var(--border);
  background:var(--surface);font-size:.95rem;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;color:var(--text-sub);font-weight:700;white-space:nowrap;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;}
.rfb.active{background:var(--em);border-color:var(--em);color:#fff;}

/* ═══ REGION ═══ */
.rg-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:1100px){.rg-grid{grid-template-columns:1fr;}}

.rg-hdr{display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-radius:10px 10px 0 0;
  font-weight:800;font-size:1rem;color:#fff;background:var(--em);}
.rg-cnt{font-weight:400;font-size:.78rem;opacity:.85;}
.rg-stat{margin-left:auto;font-size:.85rem;font-weight:600;}

/* ═══ BRANCH ═══ */
.br-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:10px;padding:10px;
  background:var(--surface);border:1px solid var(--border);
  border-top:none;border-radius:0 0 var(--r) var(--r);}
.br-card{background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;box-shadow:var(--shadow);}
.br-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;border-bottom:1px solid var(--border);
  background:#e8edf4;font-weight:800;font-size:1rem;gap:6px;}
.br-dot{width:9px;height:9px;border-radius:50%;background:var(--em);flex-shrink:0;}
.br-name{color:#1e3a5f;}
.br-stat{font-size:.78rem;color:var(--text-sub);white-space:nowrap;font-weight:500;}
.bso{color:var(--oc);font-weight:800;}.bst{color:var(--tc);font-weight:700;}

/* ═══ MEMBER TABLE ═══ */
.mt{width:100%;border-collapse:collapse;}

/* 헤더: 번호열(연한회색) + 이름열 */
.mt{width:100%;border-collapse:collapse;table-layout:fixed;}
.mt thead th{
  padding:7px 4px;font-size:.82rem;font-weight:700;color:#fff;
  text-align:center;border-bottom:1px solid rgba(255,255,255,.15);background:#5a6a80;}
.mt thead th.th-num{
  background:#8a9ab0;width:32px;font-size:.72rem;color:rgba(255,255,255,.8);}
.mt thead th.thn{text-align:left;padding-left:10px;width:auto;}
.mt thead th.th-chk{width:48px;} /* 창청스/일대일 열 고정 */

/* 번호 셀 */
.mt tbody td.td-num{
  text-align:center;font-size:.75rem;color:#b0bec5;font-weight:600;
  width:32px;padding:0;background:#f7f9fc;border-right:1px solid var(--border);}

.mt tbody tr{background:var(--surface);border-bottom:1px solid var(--border);}
.mt tbody tr:nth-child(even){background:#f4f7fb;}
.mt tbody tr:last-child{border-bottom:none;}

/* 이름 셀 래퍼 */
.nc-wrap{display:flex;align-items:center;padding:8px 6px 8px 10px;gap:0;}
/* 이름 인라인 편집 input */
.nc-input{
  font-size:1.17rem;font-weight:600;font-family:'Noto Sans KR',sans-serif;
  border:none;border-bottom:2px solid var(--em);outline:none;
  background:var(--em-bg);border-radius:5px 5px 0 0;
  padding:2px 6px;color:var(--text);width:100%;
}
.nc{font-size:1.17rem;font-weight:600;
  cursor:pointer;user-select:none;
  display:flex;align-items:center;gap:6px;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nc.conf{background:var(--conf)!important;border-radius:5px;padding:2px 6px;}
.conf-dot{width:7px;height:7px;border-radius:50%;background:var(--conf-b);
  flex-shrink:0;opacity:0;transition:opacity .2s;}
.conf .conf-dot{opacity:1;}

/* 관리자 편집 버튼 — 완전 제거 */
.row-acts{display:none;}

/* 체크 셀 — 고정 너비 */
.cc{text-align:center;width:48px;min-width:48px;padding:9px 2px;
  font-size:1.2rem;font-weight:900;user-select:none;cursor:default;color:transparent;}
.cc.clk{cursor:pointer;}
.cc.o.on{color:var(--oc);font-size:1.3rem;}
.cc.t.on{color:var(--tc);}

/* 공란 행 */
.blk td{background:#f9fafc!important;border-bottom:1px dashed var(--border);}
.blk-inner{display:flex;align-items:center;gap:6px;padding:6px 8px 6px 10px;}
.ii{flex:1;border:none;border-bottom:1.5px solid var(--em);
  background:transparent;font-family:'Noto Sans KR',sans-serif;
  font-size:1.05rem;padding:7px 4px;outline:none;color:var(--text);min-width:0;}
.ii::placeholder{color:var(--text-light);font-size:.88rem;}
.ii-confirm{
  flex-shrink:0;
  border:none;border-radius:7px;
  background:var(--em);color:#fff;
  font-family:'Noto Sans KR',sans-serif;font-size:.85rem;font-weight:700;
  padding:8px 14px;cursor:pointer;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
  opacity:0;pointer-events:none;transition:opacity .15s;
}
.ii-confirm.show{opacity:1;pointer-events:auto;}
.blk .ec{background:#f0faf7;}

/* ═══ YEARLY ═══ */
.yw{overflow-x:auto;border-radius:var(--r);box-shadow:var(--shadow);}
.yt{width:100%;border-collapse:collapse;background:var(--surface);font-size:.88rem;min-width:860px;}
.yt thead th{padding:10px 6px;text-align:center;font-weight:700;font-size:.85rem;color:#fff;}
.yt thead th.yn0{background:#4b5563;width:32px;}
.yt thead th.ynb{background:#374151;text-align:left;padding-left:10px;min-width:76px;}
.yt thead th.ynn{background:#4b5563;text-align:left;padding-left:10px;min-width:80px;}
.yt thead th.ync{background:#1a9979;min-width:52px;}
.yt thead th.ynt{background:#2aa68c;min-width:52px;}
.yma{background:var(--em);}.ymb{background:var(--em-d);}
.yt tbody tr{border-bottom:1px solid var(--border);}
.yt tbody tr:nth-child(even){background:var(--surface2);}
.yt tbody td{padding:8px 5px;text-align:center;min-width:36px;font-size:.88rem;cursor:default;}
.yt tbody td.yn0{font-size:.72rem;color:var(--text-light);}
.yt tbody td.ynb{text-align:left;padding-left:10px;color:var(--text-sub);white-space:nowrap;border-right:1px solid var(--border);}
.yt tbody td.ynn{text-align:left;padding-left:10px;font-weight:700;white-space:nowrap;
  position:sticky;left:0;background:inherit;border-right:1px solid var(--border);}
.yt tbody td.ync{font-weight:800;color:var(--oc);background:rgba(62,201,167,.1);}
.yt tbody td.ynt{font-weight:700;color:#2e9e88;background:rgba(62,201,167,.06);}
.yt .yo{color:var(--oc);font-weight:900;font-size:.95rem;}
.yt .yt2{color:var(--tc);font-weight:700;}
.yr-sp td{height:10px;background:var(--bg)!important;border:none!important;padding:0!important;}
.yr-lb td{padding:6px 12px!important;font-size:.75rem;font-weight:800;
  letter-spacing:.06em;color:#fff;background:var(--em-d)!important;}
.yb-sp td{height:5px;background:#e8f9f5!important;border:none!important;
  border-top:1.5px solid #b2ece0!important;padding:0!important;}
.chg-n{color:#7c3aed;font-weight:800;}
.chg-b{font-size:.62rem;background:#ede9fe;color:#7c3aed;
  border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;vertical-align:middle;}

/* 연간기록 드롭다운 */
.y-dd{
  position:absolute;z-index:400;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;box-shadow:var(--shadow-md);
  min-width:120px;overflow:hidden;
}
.y-dd button{
  display:block;width:100%;padding:10px 14px;border:none;background:none;
  text-align:left;font-size:.9rem;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;font-weight:600;color:var(--text);
}
.y-dd button:hover{background:var(--surface2);}
.y-dd button.active{color:var(--oc);background:#e8f9f5;}
.yt tbody td.editable{cursor:pointer;position:relative;}
.yt tbody td.editable:hover{background:rgba(78,124,255,.06)!important;}

/* ═══ STATS ═══ */
.sc{margin-bottom:26px;}
.sc h3{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:10px;}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;}
.cc-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;box-shadow:var(--shadow);}
.cc-card h4{font-size:.85rem;font-weight:700;color:var(--text-sub);margin-bottom:10px;}
.cc-card canvas{max-height:140px;}

/* ═══ MODAL ═══ */
.ov{display:none;position:fixed;inset:0;z-index:700;
  background:rgba(0,0,0,.48);align-items:center;justify-content:center;}
.ov.open{display:flex;}
.modal{background:var(--surface);border-radius:14px;
  padding:26px 28px;width:min(360px,94vw);box-shadow:var(--shadow-md);}
.modal h2{font-size:1.1rem;font-weight:800;color:var(--head-bg);margin-bottom:16px;}
.modal input{width:100%;border:2px solid var(--border);border-radius:8px;
  padding:11px 13px;font-size:1rem;font-family:'Noto Sans KR',sans-serif;
  margin-bottom:10px;background:var(--surface2);outline:none;}
.modal input:focus{border-color:var(--head-acc);}
.merr{color:#ef4444;font-size:.8rem;margin-bottom:8px;display:none;}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;}
.mbtns button{padding:10px 18px;border-radius:8px;border:none;
  font-size:.9rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-weight:700;}
.bc{background:var(--surface2);color:var(--text-sub);}
.bo{background:var(--head-acc);color:#fff;}
.bd{background:#fee2e2;color:#ef4444;}

#offlineBanner{
  display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:#1e2d5a;color:#fff;padding:10px 20px;border-radius:10px;
  font-size:.78rem;font-weight:700;z-index:800;box-shadow:var(--shadow-md);white-space:nowrap;
}
</style>
</head>
<body>

<!-- 관리자 모달 -->
<div class="ov" id="adminModal">
  <div class="modal">
    <h2>🔐 관리자 인증</h2>
    <input type="password" id="adminPwIn" placeholder="비밀번호 입력" autocomplete="off">
    <p class="merr" id="pwErr">비밀번호가 맞지 않습니다.</p>
    <div class="mbtns">
      <button class="bc" onclick="closeModal('adminModal')">취소</button>
      <button class="bo" onclick="tryLogin()">확인</button>
    </div>
  </div>
</div>

<!-- 이름 편집 모달 -->
<div class="ov" id="editModal">
  <div class="modal">
    <h2>✏️ 이름 수정 / 삭제</h2>
    <input type="text" id="editIn" placeholder="새 이름 입력">
    <p class="merr" id="editErr">이미 존재하는 이름입니다.</p>
    <div class="mbtns">
      <button class="bd" onclick="confirmDel()">삭제</button>
      <button class="bc" onclick="closeModal('editModal')">취소</button>
      <button class="bo" onclick="confirmEdit()">저장</button>
    </div>
  </div>
</div>

<!-- 연간기록 드롭다운 -->
<div class="y-dd" id="yearlyDD" style="display:none;">
  <button onclick="setYearlyCheck('o')">✓ 창청스</button>
  <button onclick="setYearlyCheck('t')">△ 일대일</button>
  <button onclick="setYearlyCheck('')">— 불참</button>
</div>

<!-- HEADER -->
<header id="hdr">
  <div class="hdr-row1">
    <span class="htitle">신강북권 여자부 창가청년스쿨</span>
  </div>
  <div class="hdr-row2">
    <span class="adm-badge" id="admBadge">✓ 관리자</span>
    <div class="tab-btns">
      <button class="tb active" onclick="switchTab('check',this)">인원 체크</button>
      <button class="tb" onclick="switchTab('yearly',this)">연간기록</button>
      <button class="tb" onclick="switchTab('stats',this)">통계</button>
    </div>
    <button class="adm-btn" id="admToggle" onclick="handleAdmin()">관리자</button>
  </div>
  <div id="syncBar">
    <span class="sync-dot" id="syncDot"></span>
    <span id="syncMsg">연결 중...</span>
  </div>
</header>

<!-- STATS BAR: 월(왼쪽) + 창청스/일대일(오른쪽) -->
<div id="statsBar">
  <div class="stats-inner">
    <div class="month-nav">
      <button class="mnav-btn" onclick="shiftMonth(-1)">&#8249;</button>
      <span class="month-label" id="monthLabel" onclick="openMonthSel()">4월</span>
      <button class="mnav-btn" onclick="shiftMonth(1)">&#8250;</button>
      <select class="month-sel-hidden" id="monthSel" onchange="changeMonth(this.value)">
        <option value="2">2월</option><option value="3">3월</option>
        <option value="4" selected>4월</option><option value="5">5월</option>
        <option value="6">6월</option><option value="7">7월</option>
        <option value="8">8월</option><option value="9">9월</option>
        <option value="10">10월</option><option value="11">11월</option>
        <option value="12">12월</option>
      </select>
    </div>
    <div class="stats-counts">
      <div class="sc-item">
        <span class="sc-label">창청스</span>
        <span class="sc-val vo" id="fO">0</span>
      </div>
      <div class="sc-item">
        <span class="sc-label">일대일</span>
        <span class="sc-val vt" id="fTri">0</span>
      </div>
    </div>
  </div>
</div>

<!-- TAB: 인원체크 -->
<div class="tab active" id="tab-check">
  <div class="rf" id="rf">
    <button class="rfb active" onclick="filterReg('all',this)">전체</button>
    <button class="rfb" onclick="filterReg('강북',this)">강북</button>
    <button class="rfb" onclick="filterReg('미아',this)">미아</button>

/* ── DB ── */
let DB={},fbConnected=false;
function dbKey(m,bid,n,t){return `c/${m}/${bid}/${n.replace(/[.#$/\[\]]/g,'_')}/${t}`;}
function conKey(m,bid,n){return `con/${m}/${bid}/${n.replace(/[.#$/\[\]]/g,'_')}`;}
function exKey(bid){return `ex/${bid}`;}
function hidKey(bid){return `hid/${bid}`;}
function dbGet(path,def=null){
  const parts=path.split('/');let cur=DB;
  for(const p of parts){if(cur==null)return def;cur=cur[p];}
  return cur??def;
}
function dbSet(path,val){
  const parts=path.split('/');let cur=DB;
  for(let i=0;i<parts.length-1;i++){if(!cur[parts[i]])cur[parts[i]]={};cur=cur[parts[i]];}
  if(val===null)delete cur[parts[parts.length-1]];else cur[parts[parts.length-1]]=val;
}
function getChk(m,bid,n,t){return dbGet(dbKey(m,bid,n,t),false)===true;}
function setChkDB(m,bid,n,t,v){const p=dbKey(m,bid,n,t);dbSet(p,v||null);fbWrite(p,v||null);}
function getCon(m,bid,n){return dbGet(conKey(m,bid,n),false)===true;}
function setConDB(m,bid,n,v){const p=conKey(m,bid,n);dbSet(p,v||null);fbWrite(p,v||null);}
function getExtra(bid){const v=dbGet(exKey(bid),[]);return Array.isArray(v)?v:Object.values(v||{});}
function setExtraDB(bid,arr){dbSet(exKey(bid),arr.length?arr:null);fbWrite(exKey(bid),arr.length?arr:null);}
function getHidden(bid){const v=dbGet(hidKey(bid),[]);return Array.isArray(v)?v:Object.values(v||{});}
function setHiddenDB(bid,arr){dbSet(hidKey(bid),arr.length?arr:null);fbWrite(hidKey(bid),arr.length?arr:null);}
function fbWrite(path,val){
  if(!fbConnected||!window._fbReady){lsSave();return;}
  const db=window._fbDB,r=window._fbRef;
  if(val===null)window._fbRemove(r(db,path)).catch(console.warn);
  else window._fbSet(r(db,path),val).catch(console.warn);
  lsSave();
}
function lsSave(){try{localStorage.setItem('sgb_v5',JSON.stringify(DB));}catch{}}
function lsLoad(){try{const d=localStorage.getItem('sgb_v5');if(d)DB=JSON.parse(d);}catch{}}

function allMembers(b){
  const hidden=getHidden(b.id);
  const base=b.members.filter(n=>!hidden.includes(n));
  return [...base,...getExtra(b.id)].sort((a,z)=>a.localeCompare(z,'ko'));
}
function findBranch(bid){for(const r of REGIONS){const b=r.branches.find(b=>b.id===bid);if(b)return b;}return null;}

/* ── Firebase init ── */
function initFirebase(){
  if(!window._fbReady){setSyncStatus(false,'Firebase 연결 실패 — 로컬 모드');return;}
  const db=window._fbDB,r=window._fbRef;
  try{
    let firstLoad=true;
    window._fbOnValue(r(db,'/'),snap=>{
      const serverData = snap.val()||{};
      if(firstLoad){
        firstLoad=false;
        // 첫 로드: 서버+로컬 SEED merge 후 서버에 업로드
        function deepMerge(t,s){
          for(const k in s){
            if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k])){
              if(!t[k])t[k]={};deepMerge(t[k],s[k]);
            }else{t[k]=s[k];}
          }return t;
        }
        DB = deepMerge(serverData, DB); // 서버 기반으로 로컬 SEED merge
        window._fbSet(r(db,'/'), DB)    // 한 번에 통째로 올리기
          .then(()=>{ lsSave();fbConnected=true;setSyncStatus(true,'실시간 동기화 중');renderAll(); })
          .catch(()=>{ fbConnected=true;setSyncStatus(true,'실시간 동기화 중');renderAll(); });
      } else {
        DB=serverData;lsSave();fbConnected=true;
        setSyncStatus(true,'실시간 동기화 중');renderAll();
      }
    },err=>{setSyncStatus(false,'Firebase 연결 오류');renderAll();});
  }catch(e){setSyncStatus(false,'Firebase 설정 필요');}
}
function setSyncStatus(ok,msg){
  document.getElementById('syncDot').className='sync-dot '+(ok?'ok':'err');
  document.getElementById('syncMsg').textContent=msg;
  document.getElementById('offlineBanner').style.display=ok?'none':'block';
  if(ok)setTimeout(()=>{document.getElementById('offlineBanner').style.display='none';},3000);
}

/* ═══ 인원체크 렌더 ═══ */
function renderCheck(){
  const area=document.getElementById('checkArea');
  area.innerHTML='';const m=currentMonth;
  REGIONS.forEach(region=>{
    const el=document.createElement('div');
    el.className='rg-block';el.dataset.r=region.id;
    if(curFilterC!=='all'&&curFilterC!==region.id)el.style.display='none';
    let rTotal=0,rO=0,rT=0;
    region.branches.forEach(b=>{
      const mem=allMembers(b);rTotal+=mem.length;
      mem.forEach(n=>{if(getChk(m,b.id,n,'o'))rO++;if(getChk(m,b.id,n,'t'))rT++;});
    });
    const rh=document.createElement('div');rh.className='rg-hdr';
    rh.innerHTML=`<span>${region.name}</span><span class="rg-cnt">(${rTotal}명)</span>
      <span class="rg-stat">창청스 ${rO} · 일대일 ${rT}</span>`;
    el.appendChild(rh);
    const grid=document.createElement('div');grid.className='br-grid';
    el.appendChild(grid);area.appendChild(el);

    region.branches.forEach(b=>{
      const mem=allMembers(b);
      const bO=mem.filter(n=>getChk(m,b.id,n,'o')).length;
      const bT=mem.filter(n=>getChk(m,b.id,n,'t')).length;
      const extras=getExtra(b.id);

      const card=document.createElement('div');
      card.className='br-card';card.id=`card-${b.id}`;
      card.innerHTML=`
        <div class="br-hdr">
          <span class="br-dot"></span>
          <span class="br-name">${b.name}</span>
          <span class="br-stat" id="bs-${b.id}">
            창청스 <span class="bso">${bO}명</span> · 일대일 <span class="bst">${bT}명</span>
          </span>
        </div>
        <table class="mt">
          <thead><tr>
            <th class="th-num">#</th>
            <th class="thn">이름</th>
            <th class="th-chk">창청스</th><th class="th-chk">일대일</th>
          </tr></thead>
          <tbody id="tb-${b.id}"></tbody>
        </table>`;
      grid.appendChild(card);

      const tbody=card.querySelector(`#tb-${b.id}`);
      mem.forEach((name,i)=>appendRow(tbody,b,name,m,i,extras.includes(name)));
      appendBlank(tbody,b);
    });
  });
  updateTotals();
}

function appendRow(tbody,b,name,m,idx,isEx){
  const isO=getChk(m,b.id,name,'o'),isTri=getChk(m,b.id,name,'t'),isCon=getCon(m,b.id,name);
  const tr=document.createElement('tr');
  tr.id=`row-${b.id}-${encodeURIComponent(name)}`;
  if(idx%2===1)tr.style.background='#f4f7fb';

  /* 번호 셀 */
  const tdNum=document.createElement('td');tdNum.className='td-num';
  tdNum.textContent=idx+1;tr.appendChild(tdNum);

  /* 이름 셀 */
  const td1=document.createElement('td');td1.style.padding='0';
  const wrap=document.createElement('div');wrap.className='nc-wrap';

  const nspan=document.createElement('span');
  nspan.className='nc'+(isCon?' conf':'');
  nspan.innerHTML=`<span class="conf-dot"></span>${name}`;

  if(isAdmin){
    /* 관리자: 이름 클릭 → 인라인 편집 */
    nspan.title='클릭하여 수정';
    nspan.onclick=e=>{e.stopPropagation();startInlineEdit(td1,wrap,nspan,b,name,m,isEx,tr);};
  } else {
    /* 일반: 이름 클릭 → 확답 토글 */
    nspan.onclick=()=>doConf(b.id,name,m);
  }
  wrap.appendChild(nspan);
  td1.appendChild(wrap);tr.appendChild(td1);

  const td2=document.createElement('td');
  td2.className='cc o'+(isO?' on':'')+(isAdmin?' clk':'');td2.textContent='✓';
  if(isAdmin)td2.onclick=()=>doChk(b.id,name,m,'o',td2);tr.appendChild(td2);

  const td3=document.createElement('td');
  td3.className='cc t'+(isTri?' on':'')+(isAdmin?' clk':'');td3.textContent='✓';
  if(isAdmin)td3.onclick=()=>doChk(b.id,name,m,'t',td3);tr.appendChild(td3);

  tbody.appendChild(tr);
}

/* 인라인 이름 편집 */
function startInlineEdit(td1,wrap,nspan,b,origName,m,isEx,tr){
  /* 이미 편집 중이면 무시 */
  if(wrap.querySelector('.nc-input')) return;

  const inp=document.createElement('input');
  inp.className='nc-input';inp.value=origName;inp.type='text';
  inp.setAttribute('enterkeyhint','done');
  wrap.replaceChild(inp,nspan);
  inp.focus();inp.select();

  /* 삭제 버튼 */
  const delBtn=document.createElement('button');
  delBtn.style.cssText='border:none;background:none;cursor:pointer;padding:4px 6px;font-size:.9rem;color:#ef9090;flex-shrink:0;';
  delBtn.textContent='✕';
  delBtn.title='삭제';
  wrap.appendChild(delBtn);

  function saveEdit(){
    const nw=inp.value.trim();
    if(!nw||nw===origName){cancelEdit();return;}
    if(allMembers(b).filter(n=>n!==origName).includes(nw)){
      inp.style.borderColor='#ef4444';
      setTimeout(()=>{inp.style.borderColor='';},1200);
      return;
    }
    /* 이름 변경 실행 */
    if(isEx){const ex=[...getExtra(b.id)];const i=ex.indexOf(origName);if(i>=0){ex[i]=nw;setExtraDB(b.id,ex);}}
    else{const h=[...getHidden(b.id)];if(!h.includes(origName))h.push(origName);setHiddenDB(b.id,h);
      const ex=[...getExtra(b.id)];ex.push(nw);setExtraDB(b.id,ex);}
    renameStorage(b.id,origName,nw);
    renderCheck();
  }
  function cancelEdit(){
    if(wrap.contains(inp))wrap.replaceChild(nspan,inp);
    if(wrap.contains(delBtn))wrap.removeChild(delBtn);
  }
  function doDelete(){
    if(!confirm(`'${origName}'을(를) 삭제하시겠습니까?`))return;
    if(isEx){setExtraDB(b.id,[...getExtra(b.id)].filter(n=>n!==origName));}
    else{const h=[...getHidden(b.id)];if(!h.includes(origName))h.push(origName);setHiddenDB(b.id,h);}
    delStorage(b.id,origName);renderCheck();
  }

  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();saveEdit();}
    if(e.key==='Escape'){cancelEdit();}
  });
  inp.addEventListener('blur',()=>setTimeout(saveEdit,150));
  delBtn.addEventListener('mousedown',e=>{e.preventDefault();});
  delBtn.addEventListener('click',()=>doDelete());
}

function appendBlank(tbody,b){
  const tr=document.createElement('tr');tr.className='blk';

  /* 번호 셀 */
  const tdNum=document.createElement('td');tdNum.className='td-num';tr.appendChild(tdNum);

  /* 입력 셀 */
  const td1=document.createElement('td');td1.colSpan=3;

  const inner=document.createElement('div');inner.className='blk-inner';

  const inp=document.createElement('input');
  inp.className='ii';
  inp.placeholder='이름 입력';
  inp.type='text';
  inp.setAttribute('enterkeyhint','done');  // 모바일 키보드 완료 버튼

  const confirmBtn=document.createElement('button');
  confirmBtn.className='ii-confirm';
  confirmBtn.textContent='추가';
  confirmBtn.type='button';

  function doAdd(){
    const v=inp.value.trim();if(!v)return;
    if(allMembers(b).includes(v)){
      inp.style.borderColor='#ef4444';
      inp.placeholder='이미 있는 이름';
      setTimeout(()=>{inp.style.borderColor='';inp.placeholder='이름 입력';inp.value='';confirmBtn.classList.remove('show');},1400);
      return;
    }
    const ex=[...getExtra(b.id)];ex.push(v);setExtraDB(b.id,ex);
    inp.value='';confirmBtn.classList.remove('show');
    renderCheck();
  }

  /* 입력값 변화 → 버튼 표시/숨김 */
  function updateConfirmBtn(){
    confirmBtn.classList.toggle('show', inp.value.trim().length>0);
  }
  inp.addEventListener('input', updateConfirmBtn);
  inp.addEventListener('focus', updateConfirmBtn);
  /* Enter 키 */
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doAdd();}});
  /* 추가 버튼 — mousedown으로 blur보다 먼저 잡기 */
  confirmBtn.addEventListener('mousedown',e=>e.preventDefault());
  confirmBtn.addEventListener('touchstart',e=>{e.preventDefault();doAdd();},{passive:false});
  confirmBtn.addEventListener('click',()=>doAdd());
  /* blur 시 잠깐 딜레이 후 숨김 */
  inp.addEventListener('blur',()=>{
    setTimeout(()=>{if(!inp.value.trim())confirmBtn.classList.remove('show');},300);
  });

  inner.appendChild(inp);inner.appendChild(confirmBtn);
  td1.appendChild(inner);tr.appendChild(td1);
  tbody.appendChild(tr);
}

function doConf(bid,name,m){
  const cur=getCon(m,bid,name);setConDB(m,bid,name,!cur);
  const tr=document.getElementById(`row-${bid}-${encodeURIComponent(name)}`);
  if(tr){const nc=tr.querySelector('.nc');if(nc)nc.classList.toggle('conf',!cur);}
}
function doChk(bid,name,m,type,cell){
  if(!isAdmin)return;
  const cur=getChk(m,bid,name,type),other=type==='o'?'t':'o';
  if(!cur){
    setChkDB(m,bid,name,other,false);
    const tr=document.getElementById(`row-${bid}-${encodeURIComponent(name)}`);
    if(tr)tr.querySelector(`.cc.${other}`)?.classList.remove('on');
  }
  setChkDB(m,bid,name,type,!cur);cell.classList.toggle('on',!cur);
  refreshBS(bid,m);updateTotals();
}
function refreshBS(bid,m){
  for(const reg of REGIONS){
    const b=reg.branches.find(b=>b.id===bid);if(!b)continue;
    const mem=allMembers(b);
    const bO=mem.filter(n=>getChk(m,b.id,n,'o')).length;
    const bT=mem.filter(n=>getChk(m,b.id,n,'t')).length;
    const el=document.getElementById(`bs-${bid}`);
    if(el)el.innerHTML=`창청스 <span class="bso">${bO}명</span> · 일대일 <span class="bst">${bT}명</span>`;
    return;
  }
}
function updateTotals(){
  let oC=0,tC=0;const m=currentMonth;
  REGIONS.forEach(r=>r.branches.forEach(b=>{

/* ── 편집/삭제 ── */
function openEdit(bid,orig,isEx){
  editState={bid,orig,isExtra:isEx};
  document.getElementById('editIn').value=orig;
  document.getElementById('editErr').style.display='none';
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById('editIn').focus(),80);
}
function renameStorage(bid,old,nw){
  MONTHS.forEach(m=>{
    ['o','t'].forEach(t=>{if(getChk(m,bid,old,t)){setChkDB(m,bid,nw,t,true);setChkDB(m,bid,old,t,false);}});
    if(getCon(m,bid,old)){setConDB(m,bid,nw,true);setConDB(m,bid,old,false);}
  });
}
function delStorage(bid,name){MONTHS.forEach(m=>{['o','t'].forEach(t=>setChkDB(m,bid,name,t,false));setConDB(m,bid,name,false);});}
function confirmEdit(){
  const nw=document.getElementById('editIn').value.trim();if(!nw)return;
  const {bid,orig,isExtra}=editState;
  if(nw===orig){closeModal('editModal');return;}
  const b=findBranch(bid);if(!b)return;
  if(allMembers(b).includes(nw)){document.getElementById('editErr').style.display='block';return;}
  if(isExtra){const ex=[...getExtra(bid)];const i=ex.indexOf(orig);if(i>=0){ex[i]=nw;setExtraDB(bid,ex);}}
  else{const h=[...getHidden(bid)];if(!h.includes(orig))h.push(orig);setHiddenDB(bid,h);const ex=[...getExtra(bid)];ex.push(nw);setExtraDB(bid,ex);}
  renameStorage(bid,orig,nw);closeModal('editModal');renderCheck();
}
function confirmDel(){
  const {bid,orig,isExtra}=editState;
  if(!confirm(`'${orig}'을(를) 삭제하시겠습니까?`))return;
  if(isExtra){setExtraDB(bid,[...getExtra(bid)].filter(n=>n!==orig));}
  else{const h=[...getHidden(bid)];if(!h.includes(orig))h.push(orig);setHiddenDB(bid,h);}
  delStorage(bid,orig);closeModal('editModal');renderCheck();
}
function quickDel(b,name,isEx){
  if(!isAdmin)return;
  if(!confirm(`'${name}'을(를) 삭제하시겠습니까?`))return;
  if(isEx){setExtraDB(b.id,[...getExtra(b.id)].filter(n=>n!==name));}
  else{const h=[...getHidden(b.id)];if(!h.includes(name))h.push(name);setHiddenDB(b.id,h);}
  delStorage(b.id,name);renderCheck();
}

/* ═══ 연간기록 ═══ */
let yddActive=null; // 현재 열린 드롭다운 td
function renderYearly(){
  const tbl=document.getElementById('yearlyTable');
  const cols=3+MONTHS.length+2;
  let h='<thead><tr>';
  h+=`<th class="yn0">#</th><th class="ynb">지부</th><th class="ynn">이름</th>`;
  MONTHS.forEach((mo,i)=>{h+=`<th class="${i%2===0?'yma':'ymb'}">${mo}월</th>`;});
  h+=`<th class="ync">창청스</th><th class="ynt">일대일</th></tr></thead><tbody>`;

  const filtReg=REGIONS.filter(r=>curFilterY==='all'||r.id===curFilterY);
  filtReg.forEach(reg=>{
    h+=`<tr class="yr-sp"><td colspan="${cols}"></td></tr>`;
    h+=`<tr class="yr-lb"><td colspan="${cols}">${reg.name}</td></tr>`;
    reg.branches.forEach((b,bi)=>{
      if(bi>0)h+=`<tr class="yb-sp"><td colspan="${cols}"></td></tr>`;
      allMembers(b).forEach((name,ni)=>{
        const cO=MONTHS.filter(mo=>getChk(mo,b.id,name,'o')).length;
        const cT=MONTHS.filter(mo=>getChk(mo,b.id,name,'t')).length;
        const curState=getChk(currentMonth,b.id,name,'o')?'O':getChk(currentMonth,b.id,name,'t')?'T':'';
        const prevM=currentMonth>2?currentMonth-1:null;
        const prevState=prevM?(getChk(prevM,b.id,name,'o')?'O':getChk(prevM,b.id,name,'t')?'T':''):'';
        const chg=prevM&&(curState!==prevState)&&(curState!=='');
        const stripe=ni%2===0?'':'style="background:var(--surface2)"';
        const nHtml=chg?`<span class="chg-n">${name}</span><span class="chg-b">변동</span>`:name;
        h+=`<tr ${stripe}><td class="yn0">${ni+1}</td><td class="ynb">${b.name}</td>`;
        h+=`<td class="ynn">${nHtml}</td>`;
        MONTHS.forEach(mo=>{
          const isO2=getChk(mo,b.id,name,'o'),isT2=getChk(mo,b.id,name,'t');
          const cls=isAdmin?'editable':'';
          const eid=isAdmin?`data-bid="${b.id}" data-name="${encodeURIComponent(name)}" data-mo="${mo}"`:''
          if(isO2)h+=`<td class="yo ${cls}" ${eid}>O</td>`;
          else if(isT2)h+=`<td class="yt2 ${cls}" ${eid}>△</td>`;
          else h+=`<td class="${cls}" ${eid}></td>`;
        });
        h+=`<td class="ync">${cO||''}</td><td class="ynt">${cT||''}</td></tr>`;
      });
    });
  });
  h+='</tbody>';
  tbl.innerHTML=h;

  /* 관리자 드롭다운 이벤트 */
  if(isAdmin){
    tbl.querySelectorAll('td.editable').forEach(td=>{
      td.addEventListener('click',e=>{
        e.stopPropagation();
        const bid=td.dataset.bid,name=decodeURIComponent(td.dataset.name),mo=parseInt(td.dataset.mo);
        yddState={bid,name,month:mo,td};
        const dd=document.getElementById('yearlyDD');
        const r=td.getBoundingClientRect();
        dd.style.left=Math.min(r.left+window.scrollX,window.innerWidth-140)+'px';
        dd.style.top=(r.bottom+window.scrollY+4)+'px';
        /* 현재 상태 하이라이트 */
        const cur=getChk(mo,bid,name,'o')?'o':getChk(mo,bid,name,'t')?'t':'';
        dd.querySelectorAll('button').forEach((btn,i)=>{
          const vals=['o','t',''];
          btn.classList.toggle('active',vals[i]===cur);
        });
        dd.style.display='block';
        if(yddActive&&yddActive!==td)yddActive._ddOpen=false;
        yddActive=td;
      });
    });
  }
}

function setYearlyCheck(val){
  const {bid,name,month,td}=yddState;if(!td)return;
  const other=val==='o'?'t':val==='t'?'o':'';
  setChkDB(month,bid,name,'o',val==='o'||null);
  setChkDB(month,bid,name,'t',val==='t'||null);
  document.getElementById('yearlyDD').style.display='none';
  renderYearly();
  /* 인원체크 탭도 실시간 반영 */
  refreshBS(bid,currentMonth);updateTotals();
}

let chartInst={};
function renderStats(){
  const area=document.getElementById('statsArea');area.innerHTML='';
  Object.values(chartInst).forEach(c=>c.destroy());chartInst={};
  const filtReg=REGIONS.filter(r=>curFilterS==='all'||r.id===curFilterS);
  const s0=document.createElement('div');s0.className='sc';
  s0.innerHTML='<h3>📊 월별 참석 추이</h3>';
  const cc0=document.createElement('div');cc0.className='cc-card';cc0.style.maxWidth='100%';
  const tc=document.createElement('canvas');cc0.appendChild(tc);s0.appendChild(cc0);area.appendChild(s0);
  const totalO=[],totalT=[];
  MONTHS.forEach(mo=>{
    let o=0,t=0;
    filtReg.forEach(r=>r.branches.forEach(b=>{
      allMembers(b).forEach(n=>{if(getChk(mo,b.id,n,'o'))o++;if(getChk(mo,b.id,n,'t'))t++;});
    }));
    totalO.push(o);totalT.push(t);
  });
  chartInst.total=new Chart(tc,{type:'bar',
    data:{labels:MONTHS.map(m=>m+'월'),datasets:[
      {label:'창청스',data:totalO,backgroundColor:'rgba(20,184,166,.75)',borderRadius:5},
      {label:'일대일',data:totalT,backgroundColor:'rgba(100,116,139,.5)',borderRadius:5},
    ]},
    options:{responsive:true,plugins:{legend:{position:'top',labels:{font:{size:13},boxWidth:14}}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}},grid:{color:'rgba(0,0,0,.04)'}},
              x:{ticks:{font:{size:12}},grid:{display:false}}}}
  });
  const s1=document.createElement('div');s1.className='sc';
  s1.innerHTML='<h3>🏠 지부별 월별 참석 현황</h3>';
  const cg=document.createElement('div');cg.className='cg';
  s1.appendChild(cg);area.appendChild(s1);
  filtReg.forEach(reg=>reg.branches.forEach(b=>{
    const card=document.createElement('div');card.className='cc-card';
    card.innerHTML=`<h4>${reg.name} · ${b.name} (${allMembers(b).length}명)</h4>`;
    const cv=document.createElement('canvas');card.appendChild(cv);cg.appendChild(card);
    const oD=MONTHS.map(mo=>allMembers(b).filter(n=>getChk(mo,b.id,n,'o')).length);
    const tD=MONTHS.map(mo=>allMembers(b).filter(n=>getChk(mo,b.id,n,'t')).length);
    chartInst[b.id]=new Chart(cv,{type:'bar',
      data:{labels:MONTHS.map(m=>m+'월'),datasets:[
        {label:'창청스',data:oD,backgroundColor:'rgba(20,184,166,.75)',borderRadius:4},
        {label:'일대일',data:tD,backgroundColor:'rgba(100,116,139,.5)',borderRadius:4},
      ]},
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,max:10,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},
                x:{ticks:{font:{size:10}},grid:{display:false}}}}
    });
  }));
}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');

  if(id==='yearly')renderYearly();
  if(id==='stats')renderStats();
}
